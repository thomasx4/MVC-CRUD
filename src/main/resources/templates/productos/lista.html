<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lista de Productos</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }
        
        .content {
            padding: 30px;
        }
        
        .btn-nuevo {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 24px;
            text-decoration: none;
            border-radius: 8px;
            margin-bottom: 20px;
            transition: transform 0.3s, box-shadow 0.3s;
            font-weight: bold;
        }
        
        .btn-nuevo:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        
        th {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            text-align: left;
            font-weight: 600;
        }
        
        td {
            padding: 12px 15px;
            border-bottom: 1px solid #e0e0e0;
        }
        
        tr:hover {
            background-color: #f5f5f5;
            transition: background-color 0.3s;
        }
        
        .acciones {
            display: flex;
            gap: 10px;
        }
        
        .btn {
            padding: 6px 12px;
            text-decoration: none;
            border-radius: 5px;
            font-size: 0.9em;
            transition: all 0.3s;
            border: none;
            cursor: pointer;
            display: inline-block;
        }
        
        .btn-ver {
            background-color: #17a2b8;
            color: white;
        }
        
        .btn-ver:hover {
            background-color: #138496;
            transform: scale(1.05);
        }
        
        .btn-editar {
            background-color: #ffc107;
            color: #333;
        }
        
        .btn-editar:hover {
            background-color: #e0a800;
            transform: scale(1.05);
        }
        
        .btn-eliminar {
            background-color: #dc3545;
            color: white;
        }
        
        .btn-eliminar:hover {
            background-color: #c82333;
            transform: scale(1.05);
        }
        
        .empty-message {
            text-align: center;
            padding: 40px;
            color: #999;
            font-size: 1.2em;
        }
        
        .footer {
            background-color: #f8f9fa;
            padding: 15px;
            text-align: center;
            color: #666;
            font-size: 0.9em;
        }
        
        @media (max-width: 768px) {
            .acciones {
                flex-direction: column;
                gap: 5px;
            }
            
            .btn {
                text-align: center;
            }
            
            th, td {
                padding: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Sistema de Productos</h1>
            <p>Gestión completa de inventario</p>
        </div>
        
        <div class="content">
            <a href="/productos/nuevo" class="btn-nuevo">Nuevo Producto</a>
            
             <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Precio</th>
                        <th>Cantidad</th>
                        <th>Valor Total</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="producto : ${productos}">
                        <td th:text="${producto.id}">1</td>
                        <td th:text="${producto.nombre}">Producto</td>
                        <td th:text="'$' + ${#numbers.formatDecimal(producto.precio, 1, 2)}">$0.00</td>
                        <td th:text="${producto.cantidad}">0</td>
                        <td th:text="'$' + ${#numbers.formatDecimal(producto.precio * producto.cantidad, 1, 2)}">$0.00</td>
                        <td class="acciones">
                            <a th:href="@{/productos/ver/{id}(id=${producto.id})}" class="btn btn-ver">Ver</a>
                            <a th:href="@{/productos/editar/{id}(id=${producto.id})}" class="btn btn-editar">Editar</a>
                            <a th:href="@{/productos/eliminar/{id}(id=${producto.id})}" 
                            class="btn btn-eliminar"
                            onclick="return confirm('¿Estás seguro de eliminar este producto?')">Eliminar</a>
                        </td>
                    </tr>
                    <tr th:if="${productos.isEmpty()}">
                        <td colspan="6" class="empty-message">
                            📭 No hay productos registrados
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
        
        <div class="footer">
            <p>Total de productos: <span th:text="${productos.size()}">0</span></p>
        </div>
    </div>
</body>
</html>
