<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${accion} + ' Producto'">Formulario</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 500px;
            margin: 50px auto;
            padding: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        button {
            background-color: #00ff00;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .cancelar {
            background-color: #6c757d;
            margin-left: 10px;
        }
        .cancelar:hover {
            background-color: #5a6268;
        }
    </style>
</head>
<body>
    <h1 th:text="${accion} + ' Producto'"></h1>
    
    <form th:action="${accion == 'Crear' ? '/productos/guardar' : '/productos/actualizar/' + producto.id}" 
          th:object="${producto}" 
          method="post">
        
        <div class="form-group">
            <label>Nombre:</label>
            <input type="text" th:field="*{nombre}" required/>
        </div>
        
        <div class="form-group">
            <label>Precio:</label>
            <input type="number" step="0.01" th:field="*{precio}" required/>
        </div>
        
        <div class="form-group">
            <label>Cantidad:</label>
            <input type="number" th:field="*{cantidad}" required/>
        </div>
        
        <button type="submit">Guardar</button>
        <a href="/productos" class="cancelar">
            <button type="button">Cancelar</button>
        </a>
    </form>
</body>
</html>
